name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # Runner arm64 natif (le Pi cible est aarch64 — cf. docs/architecture.md).
    # Avant : ubuntu-latest (x86_64) + QEMU pour le cross-build, mais QEMU
    # plantait sur les binaires natifs de Next.js (SWC) : "qemu: uncaught
    # target signal 4 (Illegal instruction)". Un runner nativement arm64
    # élimine le problème et est aussi bien plus rapide (pas d'émulation).
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/vh7383/hernandes.cloud:latest
            ghcr.io/vh7383/hernandes.cloud:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur le Pi via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /opt/hernandes-cloud
            docker compose pull
            docker compose up -d
