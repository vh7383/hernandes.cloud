name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    # Runner arm64 natif (le Pi cible est aarch64 — cf. docs/architecture.md).
    # Avant : ubuntu-latest (x86_64) + QEMU pour le cross-build, mais QEMU
    # plantait sur les binaires natifs de Next.js (SWC) : "qemu: uncaught
    # target signal 4 (Illegal instruction)". Un runner nativement arm64
    # élimine le problème et est aussi bien plus rapide (pas d'émulation).
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/vh7383/hernandes.cloud:latest
            ghcr.io/vh7383/hernandes.cloud:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Déployer sur le Pi via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd /opt/hernandes-cloud
            docker compose pull
            docker compose up -d

  # kb.hernandes.cloud : site statique Quartz (carte du vault LabIA, cf.
  # docs/decisions.md). Pas de Docker/arm64 ici — c'est du HTML/CSS/JS pur,
  # buildable sur n'importe quelle archi et servi directement par nginx sur
  # le Pi (bloc nginx à poser manuellement, cf. recette).
  build-and-deploy-kb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer les dépendances de kb
        working-directory: kb
        run: npm ci

      # .quartz/ (résolution des plugins) est régénéré à chaque run plutôt
      # que committé — pesait ~900 Mo avec l'historique git de chaque plugin.
      - name: Installer les plugins Quartz (depuis quartz.lock.json)
        working-directory: kb
        run: node quartz/bootstrap-cli.mjs plugin install

      - name: Builder kb (Quartz)
        working-directory: kb
        run: npx quartz build

      - name: Configurer SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PI_SSH_KEY }}

      - name: Déployer kb sur le Pi
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PI_HOST }} >> ~/.ssh/known_hosts
          ssh -o StrictHostKeyChecking=no ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} "mkdir -p /opt/kb-hernandes-cloud/public"
          rsync -avz --delete kb/public/ ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }}:/opt/kb-hernandes-cloud/public/
